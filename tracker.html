<!DOCTYPE html>

<html lang="en" data-theme="light">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issues Tracker</title>



    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />



    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />



    <style>
        body {

            font-family: "Geist", sans-serif;

            background-color: #F8FAFC;


            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);

            background-size: 24px 24px;

        }



        .main-container {

            max-width: 1200px;

            margin: 40px auto;

            background: #FBFBFB;

            border-radius: 12px;

            padding: 24px;

        }



        #issue-modal {

            backdrop-filter: blur(6px);

            background-color: rgba(0, 0, 0, 0.4);

            transition: all 0.3s ease;

        }
    </style>

</head>



<body class="min-h-screen">

    <section class="bg-base-100 shadow-sm  px-4 md:px-10 py-2">

        <div class="max-w-[1200px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">

            <div class="flex items-center gap-2">

                <img class="w-9 h-9" src="./github-logo.png" alt="">



                <h1 class="text-xl font-bold text-gray-800">GitHub Issues Tracker</h1>

            </div>

            <div class="flex gap-3 w-full md:w-auto">

                <input id="search-input" oninput="searchIssues()" type="text" placeholder="Search issues..."
                    class="input input-bordered w-full md:w-64" />

                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>

            </div>

        </div>

    </section>



    <section
        class="flex flex-wrap gap-2 mt-6 max-w-[1200px] rounded-xl p-4 mx-auto bg-white shadow-sm border border-gray-100">

        <button onclick="filterIssues('All')" class="btn btn-sm md:btn-md btn-outline btn-primary px-6">All</button>

        <button onclick="filterIssues('Open')" class="btn btn-sm md:btn-md btn-outline btn-success px-6">Open</button>

        <button onclick="filterIssues('Closed')"
            class="btn btn-sm md:btn-md btn-outline btn-secondary px-6">Closed</button>

    </section>



    <div class="main-container shadow-2xl border border-gray-100">

        <div class="flex justify-between items-center mb-6 border-b pb-4">

            <div class="flex items-center gap-3">

                <div class="bg-purple-100 p-2 rounded-2xl">

                    <img src="./Aperture.png" alt="">



                </div>

                <div>

                    <h1 class="text-2xl font-bold text-gray-800" id="total-issues">0 Issues</h1>

                    <p class="text-sm text-gray-500">Track and manage your project issues</p>

                </div>

            </div>

            <div class="hidden sm:flex gap-4 items-center">

                <span class="flex items-center gap-1 text-sm font-medium"><span
                        class="w-3 h-3 bg-green-500 rounded-full"></span> Open</span>

                <span class="flex items-center gap-1 text-sm font-medium"><span
                        class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</span>

            </div>

        </div>



        <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        </div>

    </div>



    <div id="issue-modal" class="fixed inset-0 hidden items-center justify-center z-50 p-4">

        <div id="modal-content"
            class="bg-white w-full max-w-xl rounded-2xl shadow-2xl relative overflow-hidden scale-95 transition-transform duration-300">

        </div>

    </div>



    <script src="./tracker.js"></script>

</body>

</html>
